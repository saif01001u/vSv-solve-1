<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSV · SOLVE | Identity Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05070f;
      font-family: 'Space Grotesk', sans-serif;
      color: #eef5ff;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .logo-vsv { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #fff, #7aa9ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo-solve { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #b3ffe0, #2dd4bf); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .btn-cyber { background: rgba(20,30,55,0.7); border: 1px solid #2f4b7a; border-radius: 2rem; padding: 0.5rem 1rem; cursor: pointer; color: white; }
    .stats-panel { display: flex; flex-wrap: wrap; gap: 1rem; background: rgba(8,12,24,0.6); border-radius: 1.5rem; padding: 1rem; margin-bottom: 2rem; justify-content: space-between; }
    .stat-card { text-align: center; }
    .stat-number { font-size: 1.8rem; font-weight: 700; color: #60a5fa; }
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .glass-card { background: rgba(10,15,28,0.7); border-radius: 1.5rem; border: 1px solid rgba(59,130,246,0.2); padding: 1.5rem; }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
    input, textarea { width: 100%; background: #030712; border: 1px solid #2d3a5e; border-radius: 1rem; padding: 0.7rem; color: white; margin-bottom: 0.8rem; }
    button { background: #0f2b44; border: none; border-radius: 2rem; padding: 0.7rem; color: white; cursor: pointer; width: 100%; margin-top: 0.3rem; }
    button:hover { background: #1e3a6b; }
    .video-box { width: 100%; border-radius: 1rem; border: 2px solid #3b82f6; margin-bottom: 0.5rem; background: #000; }
    .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; border: 1px solid #3b82f6; padding: 8px 16px; border-radius: 40px; z-index: 9999; opacity: 0; transition: 0.2s; font-size: 0.8rem; }
    .api-key-box { background: #030712; border-radius: 1rem; padding: 0.5rem; font-size: 0.7rem; word-break: break-all; margin-top: 0.5rem; }
    @media (max-width: 700px) { .container { padding: 1rem; } }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div><span class="logo-vsv">VSV</span> <span style="color:#3b82f6">⚡</span> <span class="logo-solve">SOLVE</span></div>
    <div style="display: flex; gap: 0.5rem;">
      <button id="themeBtn" class="btn-cyber">🌓 THEME</button>
      <button id="walletBtn" class="btn-cyber">🔗 WALLET</button>
    </div>
  </div>

  <div class="stats-panel">
    <div class="stat-card"><div class="stat-number" id="didCount">0</div><div class="stat-label">ACTIVE DIDS</div></div>
    <div class="stat-card"><div class="stat-number" id="credCount">0</div><div class="stat-label">CREDENTIALS</div></div>
    <div class="stat-card"><div class="stat-number" id="walletStatus">Not logged in</div><div class="stat-label">WALLET</div></div>
    <div class="stat-card"><div class="stat-number" id="twofaStatus">OFF</div><div class="stat-label">2FA</div></div>
  </div>

  <div class="grid-4">
    <div class="glass-card">
      <div class="card-title">📸 FACE + 2FA</div>
      <video id="video" class="video-box" autoplay muted playsinline></video>
      <button id="registerFaceBtn">📝 REGISTER FACE HASH</button>
      <button id="verifyFaceBtn">🔐 VERIFY FACE + 2FA</button>
      <div id="faceResult" style="font-size:0.7rem; margin-top:0.5rem;"></div>
      <div id="twofaBox" style="display:none;"><input type="text" id="otpInput" placeholder="Enter 6-digit code"><button id="confirm2faBtn">Confirm 2FA</button></div>
    </div>

    <div class="glass-card">
      <div class="card-title">🔑 API KEY SYSTEM</div>
      <button id="genApiBtn">GENERATE API KEY</button>
      <div id="apiKeyDisplay" class="api-key-box">No API key</div>
      <input type="text" id="apiCredId" placeholder="Credential ID">
      <button id="testApiBtn">TEST API VERIFY</button>
      <div id="apiResult" style="font-size:0.6rem;"></div>
    </div>

    <div class="glass-card">
      <div class="card-title">📱 QR IDENTITY SHARE</div>
      <input type="text" id="qrInput" placeholder="DID or Credential ID">
      <button id="genQrBtn">GENERATE QR</button>
      <div id="qrPreview" style="display:flex; justify-content:center; margin:0.5rem 0;"></div>
      <input type="text" id="scanInput" placeholder="Paste scanned QR data">
      <button id="scanVerifyBtn">VERIFY SCANNED</button>
      <div id="scanResult" style="font-size:0.7rem;"></div>
    </div>

    <div class="glass-card">
      <div class="card-title">🆔 REGISTER</div>
      <input type="text" id="didInput" placeholder="DID (did:vsv:user)">
      <input type="text" id="pubkeyInput" placeholder="Public key (optional)">
      <button id="registerDidBtn">REGISTER DID</button>
      <div style="margin:10px 0; border-top:1px solid #1f344f;"></div>
      <input type="text" id="credIdInput" placeholder="Credential ID">
      <textarea id="claimInput" rows="2" placeholder='{"identity":"verified"}'></textarea>
      <input type="text" id="subjectInput" placeholder="Subject DID">
      <button id="issueCredBtn">ISSUE CREDENTIAL</button>
      <button id="backupBtn">💾 BACKUP ALL</button>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
    <div class="glass-card">
      <div class="card-title">🔍 VERIFY / REVOKE</div>
      <input type="text" id="verifyId" placeholder="Credential ID">
      <button id="verifyCredBtn">VERIFY</button>
      <div id="verifyResult" style="font-size:0.7rem; margin-top:0.3rem;"></div>
      <input type="text" id="revokeId" placeholder="Credential ID to revoke">
      <button id="revokeCredBtn">REVOKE</button>
    </div>
    <div class="glass-card">
      <div class="card-title">📋 AUDIT LOG <button id="clearLogBtn" style="width:auto; padding:2px 8px; font-size:0.6rem;">Clear</button></div>
      <div id="auditLog" style="height:100px; overflow-y:auto; font-size:0.65rem; background:#03060e; border-radius:1rem; padding:0.5rem;"></div>
      <div id="fraudLog" style="height:50px; overflow-y:auto; font-size:0.65rem; background:#03060e; border-radius:1rem; padding:0.5rem; margin-top:0.5rem;"></div>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
  // Data stores
  let didRegistry = new Map();
  let credentials = new Map();
  let faceHashStore = new Map();
  let walletSession = null;
  let apiKey = null;
  let twoFAEnabled = false;
  let currentOTP = null;
  let auditLog = [];
  let fraudLog = [];

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.style.backgroundColor = isError ? '#7a1a2a' : '#0f2b44';
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
  }

  function addAudit(action, details) {
    auditLog.unshift({ time: new Date().toLocaleTimeString(), action, details });
    if (auditLog.length > 30) auditLog.pop();
    document.getElementById('auditLog').innerHTML = auditLog.map(e => `<div>[${e.time}] ${e.action}: ${e.details}</div>`).join('');
  }

  function addFraud(msg) {
    fraudLog.unshift({ time: new Date().toLocaleTimeString(), msg });
    if (fraudLog.length > 10) fraudLog.pop();
    document.getElementById('fraudLog').innerHTML = fraudLog.map(e => `<div>⚠️ [${e.time}] ${e.msg}</div>`).join('');
    showToast(`Fraud: ${msg}`, true);
  }

  function updateUI() {
    document.getElementById('didCount').innerText = didRegistry.size;
    document.getElementById('credCount').innerText = credentials.size;
    document.getElementById('walletStatus').innerHTML = walletSession ? walletSession.slice(0,8)+'...' : 'Not logged in';
    document.getElementById('twofaStatus').innerHTML = twoFAEnabled ? 'ON' : 'OFF';
  }

  async function generateHashFromVideo() {
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
    const str = JSON.stringify(imageData.data.slice(0, 2000));
    const msgBuffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // Camera
  navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
    document.getElementById('video').srcObject = stream;
  }).catch(() => showToast('Camera access needed', true));

  // Register Face
  document.getElementById('registerFaceBtn').onclick = async () => {
    const did = prompt('Enter DID for face registration:');
    if (!did || !didRegistry.has(did)) { showToast('DID not found', true); return; }
    const hash = await generateHashFromVideo();
    faceHashStore.set(did, hash);
    document.getElementById('faceResult').innerHTML = `✅ Face hash saved for ${did}`;
    addAudit('FACE', `Hash registered for ${did}`);
    showToast(`Face hash stored for ${did}`);
  };

  // Verify Face + 2FA
  document.getElementById('verifyFaceBtn').onclick = async () => {
    const did = prompt('Enter DID to verify:');
    if (!did || !faceHashStore.has(did)) { showToast('No face hash', true); return; }
    const newHash = await generateHashFromVideo();
    if (newHash === faceHashStore.get(did)) {
      if (twoFAEnabled) {
        currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('twofaBox').style.display = 'block';
        document.getElementById('faceResult').innerHTML = `✅ Face matched! Enter OTP: ${currentOTP}`;
      } else {
        document.getElementById('faceResult').innerHTML = `✅ Face verified for ${did}`;
        addAudit('VERIFY', `Face verified for ${did}`);
        showToast(`Verified ${did}`);
      }
    } else {
      document.getElementById('faceResult').innerHTML = `❌ Face mismatch!`;
      addFraud(`Face mismatch for ${did}`);
    }
  };

  document.getElementById('confirm2faBtn').onclick = () => {
    if (document.getElementById('otpInput').value === currentOTP) {
      document.getElementById('faceResult').innerHTML = `✅ 2FA Verified! Identity confirmed.`;
      document.getElementById('twofaBox').style.display = 'none';
      addAudit('2FA', 'Verification successful');
      showToast('2FA successful');
    } else {
      document.getElementById('faceResult').innerHTML = `❌ Invalid OTP!`;
      addFraud('Invalid 2FA attempt');
    }
  };

  // Wallet + 2FA Toggle
  document.getElementById('walletBtn').onclick = () => {
    if (!walletSession) {
      walletSession = '0x' + Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 8);
      showToast(`Wallet: ${walletSession.slice(0,12)}...`);
    } else {
      walletSession = null;
      showToast('Wallet disconnected');
    }
    twoFAEnabled = !twoFAEnabled;
    updateUI();
    addAudit('WALLET', twoFAEnabled ? 'Connected + 2FA ON' : 'Disconnected');
  };

  // API Key
  document.getElementById('genApiBtn').onclick = () => {
    apiKey = 'vsv_' + Math.random().toString(36).substring(2, 15);
    document.getElementById('apiKeyDisplay').innerHTML = `<strong>API Key:</strong><br>${apiKey}`;
    addAudit('API', 'Key generated');
    showToast('API key generated');
  };

  document.getElementById('testApiBtn').onclick = () => {
    const credId = document.getElementById('apiCredId').value.trim();
    if (!apiKey) { document.getElementById('apiResult').innerHTML = '❌ Generate API key first'; return; }
    const cred = credentials.get(credId);
    if (!cred) { document.getElementById('apiResult').innerHTML = '❌ Credential not found'; return; }
    document.getElementById('apiResult').innerHTML = `✅ { "credential": "${credId}", "status": "${cred.revoked ? 'REVOKED' : 'VALID'}" }`;
    addAudit('API', `Verified ${credId}`);
  };

  // QR
  document.getElementById('genQrBtn').onclick = () => {
    const data = document.getElementById('qrInput').value.trim();
    if (!data) { showToast('Enter data', true); return; }
    document.getElementById('qrPreview').innerHTML = '';
    new QRCode(document.getElementById('qrPreview'), { text: data, width: 100, height: 100 });
    showToast(`QR for ${data}`);
  };

  document.getElementById('scanVerifyBtn').onclick = () => {
    const scanned = document.getElementById('scanInput').value.trim();
    if (didRegistry.has(scanned)) {
      document.getElementById('scanResult').innerHTML = `✅ Valid DID: ${scanned}`;
    } else if (credentials.has(scanned)) {
      const cred = credentials.get(scanned);
      document.getElementById('scanResult').innerHTML = `✅ Credential: ${scanned} → ${cred.revoked ? 'REVOKED' : 'VALID'}`;
    } else {
      document.getElementById('scanResult').innerHTML = `❌ Not found: ${scanned}`;
      addFraud(`QR scan failed: ${scanned}`);
    }
  };

  // DID Register
  document.getElementById('registerDidBtn').onclick = () => {
    const did = document.getElementById('didInput').value.trim();
    if (!did) { showToast('DID required', true); return; }
    if (didRegistry.has(did)) { showToast('DID exists', true); return; }
    didRegistry.set(did, { pubkey: document.getElementById('pubkeyInput').value || 'none', time: Date.now() });
    updateUI();
    document.getElementById('didInput').value = '';
    document.getElementById('pubkeyInput').value = '';
    addAudit('REGISTER', `DID ${did}`);
    showToast(`DID ${did} registered`);
  };

  // Issue Credential
  document.getElementById('issueCredBtn').onclick = () => {
    const id = document.getElementById('credIdInput').value.trim();
    const claim = document.getElementById('claimInput').value.trim();
    const subject = document.getElementById('subjectInput').value.trim();
    if (!id || !claim || !subject) { showToast('Fill all fields', true); return; }
    if (credentials.has(id)) { showToast('ID exists', true); return; }
    credentials.set(id, { claim, subject, revoked: false, time: Date.now() });
    updateUI();
    document.getElementById('credIdInput').value = '';
    document.getElementById('claimInput').value = '';
    document.getElementById('subjectInput').value = '';
    addAudit('ISSUE', `Credential ${id} to ${subject}`);
    showToast(`Issued ${id}`);
  };

  // Verify Credential
  document.getElementById('verifyCredBtn').onclick = () => {
    const id = document.getElementById('verifyId').value.trim();
    const cred = credentials.get(id);
    if (!cred) { document.getElementById('verifyResult').innerHTML = '❌ Not found'; return; }
    document.getElementById('verifyResult').innerHTML = cred.revoked ? `❌ REVOKED: ${id}` : `✅ VALID: ${id}`;
  };

  // Revoke
  document.getElementById('revokeCredBtn').onclick = () => {
    const id = document.getElementById('revokeId').value.trim();
    if (!id || !credentials.has(id)) { showToast('Not found', true); return; }
    credentials.get(id).revoked = true;
    updateUI();
    addAudit('REVOKE', `${id}`);
    showToast(`Revoked ${id}`);
  };

  // Backup
  document.getElementById('backupBtn').onclick = () => {
    const backup = { dids: Array.from(didRegistry.entries()), credentials: Array.from(credentials.entries()), faceHashes: Array.from(faceHashStore.entries()) };
    const blob = new Blob([JSON.stringify(backup)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `vsv_backup_${Date.now()}.json`;
    a.click();
    showToast('Backup exported');
  };

  // Theme
  let dark = true;
  document.getElementById('themeBtn').onclick = () => {
    dark = !dark;
    document.body.style.background = dark ? '#05070f' : '#f0f4fc';
    document.body.style.color = dark ? '#eef5ff' : '#1a1a2e';
    showToast(dark ? 'Dark mode' : 'Light mode');
  };

  document.getElementById('clearLogBtn').onclick = () => {
    auditLog = [];
    document.getElementById('auditLog').innerHTML = '';
    addAudit('SYSTEM', 'Log cleared');
  };

  // Demo data
  didRegistry.set('did:vsv:demo', { pubkey: 'demo', time: Date.now() });
  credentials.set('cred:demo:001', { claim: '{"demo":true}', subject: 'did:vsv:demo', revoked: false, time: Date.now() });
  updateUI();
  addAudit('INIT', 'Platform ready - 1 DID, 1 Credential loaded');
  showToast('VSV SOLVE Ready!');
</script>
</body>
</html>
